baseURL: "https://kangliw.github.io/"
title: Kangli Wang
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
  pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: papers/
          weight: 1
        - name: Projects
          url: projects/
          weight: 2
        - name: Blog
          url: blog/
          weight: 3

params:
    description: "Kangli Wang is a sociology PhD student at the University of Connecticut. His research focuses on immigration, STEM education, and comparative policy using quantitative methods."
    author: Kangli Wang
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["papers","projects","blog"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
          enabled: true
          title: Kangli Wang
          subtitle: "I am a PhD student in Sociology at the University of Connecticut. My research examines how immigrants navigate STEM field selection across countries, using large-scale survey data (PIAAC, OECD). I combine quantitative methods with comparative policy analysis to study immigration, education, and workforce outcomes. I am interested in careers in policy research, data science, and applied social science."
          imageUrl: "picture.jpeg"
          imageWidth: 160
          imageHeight: 160
          buttons:
            - name: Papers
              url: papers/
            - name: Projects
              url: projects/
            - name: Blog
              url: blog/
            - name: Tags
              url: tags/
            - name: Archive
              url: archive/

    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Email
          url: mailto:kangli.wang@uconn.edu
        - name: GitHub
          url: https://github.com/kangliw
        - name: LinkedIn
          url: https://www.linkedin.com/in/kangliw/
        - name: Google Scholar
          url: https://scholar.google.com/
        - name: Location
          url: location/

